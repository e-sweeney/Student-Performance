apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-performance-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-performance
  template:
    metadata:
      labels:
        app: student-performance
    spec:
      containers:
        - name: student-performance
          image: sathwik10/student-e
          ports:
            - containerPort: 5000
