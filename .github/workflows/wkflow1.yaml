name: PublishImage
on:
    workflow_dispatch  
    #this will only run if Dockerfile changes after a push
    #push:
    #    branches:
    #        - main
    #    paths:
    #        - './Dockerfile'
              

  

jobs:
    publish_images:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
            - name: Printing Folders
              run:
                ls
            - name: Login to Docker
              uses: docker/login-action@v1
              with:
                username: ${{secrets.DOCKER_HUB_USERNAME}}
                password: ${{secrets.DOCKER_HUB_ACCESS_TOKEN}}
            
            
            - name: Install MLflow
              run: pip install mlflow

            - name: Start MLflow server
              run: |
                mlflow server \
                      --host 127.0.0.1 \
                      --port 5555 \
                      --backend-store-uri sqlite:///mlflow.db \
                      --default-artifact-root ./mlruns &
            
            - name: build image
              run: |
                cd app 
                docker build . -t   edwinasweeney/my-app-es:latest
            - name: push image to docker hub
              run: |
                docker push edwinasweeney/my-app-es:latest
                docker images

            - name: Cleanup MLFlow
              run: |
                docker stop mlflow-server
                docker rm mlflow-server
                docker rmi ghcr.io/mlflow/mlflow:latest
      
